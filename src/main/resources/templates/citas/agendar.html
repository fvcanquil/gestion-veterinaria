<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Agendar Cita - Gestión Veterinaria</title>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1>🗓️ Agendar Nueva Cita</h1>

    <form th:action="@{/citas/agendar}" th:object="${cita}" method="post" class="login-form">
        <div class="form-group">
            <label>Nombre del Paciente (mascota):</label>
            <input type="text" th:field="*{nombrePaciente}" required/>
        </div>
        <div class="form-group">
            <label>Fecha y Hora:</label>
            <input type="datetime-local" th:field="*{fechaHora}" required/>
        </div>
        <div class="form-group">
            <label>Motivo de la consulta:</label>
            <input type="text" th:field="*{motivo}" placeholder="Ej: Vacunación, Control anual" required/>
        </div>
        <div class="form-group">
            <label>Veterinario asignado:</label>
            <input type="text" th:field="*{veterinario}" placeholder="Ej: Dr. García" required/>
        </div>
        <div class="form-group">
            <button type="submit" class="btn-login">Agendar Cita</button>
        </div>
    </form>

    <a th:href="@{/citas}">← Volver a la lista</a>
</div>
</body>
</html>
