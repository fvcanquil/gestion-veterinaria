<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Gestión Veterinaria - Dashboard</title>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .dashboard { max-width: 900px; }

        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 10px 0;
            border-bottom: 2px solid #eee;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.5);
            text-decoration: none;
            color: white;
        }

        .card-icon { font-size: 2.5em; margin-bottom: 10px; }
        .card-title { font-size: 1.2em; font-weight: 700; }
        .card-desc { font-size: 0.85em; margin-top: 5px; opacity: 0.85; }

        .role-badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container dashboard">

    <!-- Barra superior con usuario y rol -->
    <div class="user-bar">
        <h1>🐾 Gestión Veterinaria</h1>
        <div>
            <span>👤 <strong sec:authentication="name"></strong></span>
            &nbsp;
            <span class="role-badge" sec:authentication="authorities"></span>
        </div>
    </div>

    <!-- Solo visible si está autenticado -->
    <div sec:authorize="isAuthenticated()">
        <h2>Panel de Control</h2>
        <p style="color:#888;margin-bottom:10px;">
            Selecciona una opción para continuar
        </p>

        <div class="cards">

            <!-- Tarjeta Pacientes -->
            <a th:href="@{/pacientes}" class="card">
                <div class="card-icon">🐶</div>
                <div class="card-title">Pacientes</div>
                <div class="card-desc">Ver y registrar mascotas</div>
            </a>

            <!-- Tarjeta Citas -->
            <a th:href="@{/citas}" class="card">
                <div class="card-icon">🗓️</div>
                <div class="card-title">Citas</div>
                <div class="card-desc">Agendar y consultar citas</div>
            </a>

            <!-- Tarjeta solo visible para ADMIN -->
            <a th:href="@{/pacientes/nuevo}" class="card"
               sec:authorize="hasRole('ADMIN')">
                <div class="card-icon">➕</div>
                <div class="card-title">Nuevo Paciente</div>
                <div class="card-desc">Acceso rápido (solo Admin)</div>
            </a>

        </div>

        <!-- Botón cerrar sesión -->
        <form th:action="@{/logout}" method="post" style="margin-top:30px;">
            <button type="submit" class="btn-logout"
                    style="width:auto;padding:10px 30px;">
                🚪 Cerrar Sesión
            </button>
        </form>
    </div>

    <!-- Solo visible si NO está autenticado -->
    <div sec:authorize="!isAuthenticated()">
        <p>Por favor <a th:href="@{/login}">inicia sesión</a> para continuar.</p>
    </div>

</div>
</body>
</html>
