<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestión Veterinaria - Login</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" type="text/css" th:href="@{/styles.css}">
</head>
<body>
    <div class="login-container">
        <h1>Gestión Veterinaria</h1>
        <h2>Inicio de Sesión</h2>

        <!-- Mensaje de error -->
        <div th:if="${param.error}" class="alert alert-error">
            ❌ Usuario o contraseña incorrectos
        </div>

        <!-- Mensaje de logout exitoso -->
        <div th:if="${param.logout}" class="alert alert-success">
            ✅ Sesión cerrada correctamente
        </div>

        <!-- Formulario de login -->
        <form th:action="@{/login}" method="post" class="login-form">
            <div class="form-group">
                <label>Usuario:</label>
                <input type="text" name="username" required autofocus />
            </div>
            <div class="form-group">
                <label>Contraseña:</label>
                <input type="password" name="password" required />
            </div>
            <div class="form-group">
                <button type="submit" class="btn-login">Ingresar</button>
            </div>
        </form>

        <!-- Credenciales de prueba -->
        <div class="credentials-info">
            <p><strong>Usuarios de prueba:</strong></p>
            <ul>
                <li>Usuario: <code>user</code> / Contraseña: <code>password</code></li>
                <li>Admin: <code>admin</code> / Contraseña: <code>password</code></li>
            </ul>
        </div>
    </div>
</body>
</html>
