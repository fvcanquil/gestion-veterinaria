<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrar Paciente - Gestión Veterinaria</title>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1>🐾 Registrar Nuevo Paciente</h1>

    <form th:action="@{/pacientes/registrar}" th:object="${paciente}" method="post" class="login-form">
        <div class="form-group">
            <label>Nombre de la mascota:</label>
            <input type="text" th:field="*{nombre}" required/>
        </div>
        <div class="form-group">
            <label>Especie:</label>
            <input type="text" th:field="*{especie}" placeholder="Ej: Perro, Gato" required/>
        </div>
        <div class="form-group">
            <label>Raza:</label>
            <input type="text" th:field="*{raza}" required/>
        </div>
        <div class="form-group">
            <label>Edad (años):</label>
            <input type="number" th:field="*{edad}" min="0" required/>
        </div>
        <div class="form-group">
            <label>Nombre del Dueño:</label>
            <input type="text" th:field="*{dueno}" required/>
        </div>
        <div class="form-group">
            <button type="submit" class="btn-login">Registrar Paciente</button>
        </div>
    </form>

    <a th:href="@{/pacientes}">← Volver a la lista</a>
</div>
</body>
</html>
